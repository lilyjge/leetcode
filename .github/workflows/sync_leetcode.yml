# Sync uses repository secrets only. LeetCode’s login is behind Cloudflare Turnstile; GitHub-hosted
# runners cannot complete “Verify you are human”, so do not run Puppeteer cookie refresh here.
# Refresh LEETCODE_CSRF_TOKEN + LEETCODE_SESSION locally (see README) when the sync job starts failing.

name: Sync LeetCode

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 6"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sync submissions
        uses: joshcai/leetcode-sync@v1.7
        with:
          github-token: ${{ github.token }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          verbose: true
          commit-header: "[LeetCode Sync]"
